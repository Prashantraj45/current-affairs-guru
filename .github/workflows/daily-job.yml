name: Daily Intelligence Job

on:
  schedule:
    # 11:30 PM UTC = 5:00 AM IST daily
    - cron: '30 23 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Leave blank for yesterday IST.'
        required: false
      force:
        description: 'Force overwrite existing entry'
        required: false
        default: 'true'

jobs:
  trigger-job:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target date
        id: resolve-date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            TARGET_DATE="${{ github.event.inputs.date }}"
          else
            # Job runs at ~5 AM IST (day 2). We want data for day 1 = yesterday IST.
            # Resolve in IST so the date is correct regardless of UTC boundary.
            TARGET_DATE=$(TZ=Asia/Kolkata date -d "yesterday" +%Y-%m-%d)
          fi
          echo "TARGET_DATE=$TARGET_DATE" >> $GITHUB_OUTPUT
          echo "Resolved target date: $TARGET_DATE"

      - name: Step 1 — Force-unlock any stuck lock
        run: |
          echo "Force-unlocking daily_intelligence lock..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.RENDER_API_URL }}/api/admin/release-lock" \
            -H "Content-Type: application/json" \
            -H "x-admin-key: ${{ secrets.ADMIN_SECRET }}" \
            --max-time 30)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP $HTTP_CODE: $BODY"

      - name: Step 2 — Stop in-process scheduler
        run: |
          echo "Stopping scheduler..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.RENDER_API_URL }}/api/admin/stop" \
            -H "Content-Type: application/json" \
            -H "x-admin-key: ${{ secrets.ADMIN_SECRET }}" \
            --max-time 30)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "HTTP $HTTP_CODE: $BODY"

      - name: Step 3 — Run job for ${{ steps.resolve-date.outputs.TARGET_DATE }}
        run: |
          TARGET_DATE="${{ steps.resolve-date.outputs.TARGET_DATE }}"
          FORCE="${{ github.event.inputs.force || 'true' }}"
          BODY="{\"date\": \"$TARGET_DATE\", \"force\": $FORCE}"

          echo "Triggering job: $BODY"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.RENDER_API_URL }}/api/admin/run" \
            -H "Content-Type: application/json" \
            -H "x-admin-key: ${{ secrets.ADMIN_SECRET }}" \
            -d "$BODY" \
            --max-time 30)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY_OUT=$(echo "$RESPONSE" | head -1)

          echo "HTTP $HTTP_CODE: $BODY_OUT"

          if [ "$HTTP_CODE" -ne 200 ] && [ "$HTTP_CODE" -ne 202 ]; then
            echo "Job trigger failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Job triggered successfully for $TARGET_DATE"
